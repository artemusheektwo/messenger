<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sae chat</title>
    <style>
        /* ====== СБРОС И БАЗОВЫЕ СТИЛИ ====== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f0f0f; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Переменные тем */
        :root {
            --accent-color: #8a5cf5;
            --bg-color: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --text-color: #fff;
            --text-muted: #8e8e93;
            --border-color: #3a3a3c;
        }

        .app { width: 100%; height: 100vh; background: var(--bg-color); display: flex; flex-direction: column; position: relative; color: var(--text-color); overflow: hidden; transition: background 0.3s; }
        
        /* ====== ФОН И БЛЮР ====== */
        #app-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            filter: blur(0px); transition: filter 0.3s;
            pointer-events: none;
        }
        .app > * { position: relative; z-index: 1; }

        /* ====== СТАРТОВЫЙ ЭКРАН (SAE CHAT) ====== */
        #startScreen {
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; z-index: 2;
            background: var(--bg-color); transition: opacity 0.5s, transform 0.5s;
        }
        #startScreen.hidden { opacity: 0; transform: scale(1.1); pointer-events: none; }
        
        .start-logo { font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -1px; }
        .start-logo span { color: var(--accent-color); }
        .start-sub { color: var(--text-muted); font-size: 16px; margin-bottom: 50px; }
        
        .btn-start {
            background: var(--accent-color); color: white; border: none; padding: 16px 48px; border-radius: 50px;
            font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(138, 92, 245, 0.4);
            display: flex; align-items: center; gap: 10px;
        }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(138, 92, 245, 0.6); }

        /* ====== ЭКРАН ВХОДА/РЕГИСТРАЦИИ ====== */
        #authScreen {
            display: none; flex-direction: column; justify-content: center; padding: 30px; height: 100%; z-index: 2;
            background: var(--bg-color); animation: fadeUp 0.4s ease-out;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header .auth-logo { font-size: 32px; font-weight: 700; color: #fff; }
        .auth-header .auth-logo span { color: var(--accent-color); }
        .auth-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

        /* ДВЕ ГЛАВНЫЕ КНОПКИ НА ВХОДЕ */
        .auth-main-buttons { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
        .auth-main-btn {
            width: 100%; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer;
            border: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .auth-main-btn.login { background: var(--accent-color); color: white; }
        .auth-main-btn.login:hover { filter: brightness(1.1); transform: scale(1.02); }
        .auth-main-btn.register { background: var(--bg-secondary); color: var(--text-color); border: 1px solid var(--border-color); }
        .auth-main-btn.register:hover { background: var(--border-color); transform: scale(1.02); }

        /* Область с полями (изначально скрыта) */
        #authFormContainer {
            display: none; /* Скрыто по умолчанию */
            animation: fadeUp 0.4s ease-out;
        }

        .auth-input { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 14px 16px; border-radius: 12px; color: #fff; font-size: 15px; margin-bottom: 12px; outline: none; transition: 0.2s; }
        .auth-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(138, 92, 245, 0.2); }
        .auth-input::placeholder { color: var(--text-muted); }

        .auth-row { display: flex; gap: 12px; }
        .auth-row .auth-input { flex: 1; }

        .auth-avatar-setup { display: flex; align-items: center; gap: 16px; margin: 8px 0 16px; }
        .auth-avatar-preview { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 2px solid var(--border-color); background: var(--accent-color); flex-shrink: 0; transition: 0.3s; overflow: hidden; }
        .auth-avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .auth-avatar-controls { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .auth-avatar-controls label { font-size: 12px; color: var(--text-muted); }
        .avatar-emoji-select { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 8px; color: #fff; font-size: 20px; cursor: pointer; }
        .avatar-color-select { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border-color); background: var(--accent-color); cursor: pointer; padding: 0; }

        .auth-submit-btn { width: 100%; background: var(--accent-color); border: none; padding: 14px; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px; display: none; }
        .auth-submit-btn:hover { filter: brightness(1.1); }
        .auth-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

        .auth-back-link { text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 14px; cursor: pointer; display: none; }
        .auth-back-link span { color: var(--accent-color); font-weight: 600; }
        .auth-back-link span:hover { text-decoration: underline; }

        /* ====== ОСНОВНОЙ ЭКРАН ====== */
        #mainScreen { display: none; flex-direction: column; height: 100%; }
        .main-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; background: var(--bg-secondary); min-height: 60px; border-bottom: 1px solid var(--border-color); }
        .main-header .title-area { display: flex; align-items: center; gap: 12px; }
        .main-header .avatar-stack { display: flex; align-items: center; }
        .main-header .avatar-stack .mini-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--bg-color); margin-left: -10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white; }
        .main-header .avatar-stack .mini-avatar:first-child { margin-left: 0; }
        .main-header .title { font-size: 20px; font-weight: 600; }
        .main-header .header-actions { display: flex; gap: 12px; align-items: center; }
        .main-header .header-actions .icon-btn { color: var(--text-muted); font-size: 22px; cursor: pointer; background: none; border: none; padding: 4px; transition: color 0.2s; }
        .main-header .header-actions .icon-btn:hover { color: var(--accent-color); }

        .search-bar { padding: 8px 16px 12px; background: var(--bg-color); }
        .search-bar .search-container { background: var(--bg-secondary); border-radius: 12px; padding: 8px 14px; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .search-bar .search-container:focus-within { border: 1px solid var(--accent-color); background: var(--bg-secondary); }
        .search-bar .search-container .search-icon { color: var(--text-muted); font-size: 18px; }
        .search-bar .search-container input { flex: 1; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; }
        .search-bar .search-container input::placeholder { color: var(--text-muted); }

        /* ====== СПИСОК ЧАТОВ ====== */
        .chat-list { flex: 1; overflow-y: auto; padding: 4px 0; background: var(--bg-color); }
        .chat-item { display: flex; align-items: center; padding: 10px 16px; cursor: pointer; transition: 0.1s; position: relative; border-bottom: 1px solid var(--border-color); }
        .chat-item:hover { background: var(--bg-secondary); }
        .chat-item .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px; flex-shrink: 0; margin-right: 12px; background: var(--accent-color); }
        .chat-item .info { flex: 1; min-width: 0; }
        .chat-item .info .row { display: flex; justify-content: space-between; align-items: center; }
        .chat-item .info .name { font-size: 16px; font-weight: 500; }
        .chat-item .info .time { color: var(--text-muted); font-size: 12px; }
        .chat-item .info .last-msg { color: var(--text-muted); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
        .chat-item .info .last-msg .check { color: var(--accent-color); font-size: 14px; }
        .chat-item .badge-unread { background: var(--accent-color); color: white; border-radius: 12px; padding: 0 10px; font-size: 13px; font-weight: 600; line-height: 22px; margin-left: 6px; min-width: 22px; text-align: center; }

        /* ====== ЭКРАН ЧАТА ====== */
        #chatScreen { display: none; flex-direction: column; height: 100%; background: var(--bg-color); }
        .chat-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); }
        .chat-header .back-btn { color: var(--text-muted); font-size: 24px; cursor: pointer; background: none; border: none; padding: 4px; }
        .chat-header .back-btn:hover { color: var(--accent-color); }
        .chat-header .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 16px; }
        .chat-header .info { flex: 1; }
        .chat-header .info h2 { font-size: 18px; font-weight: 600; }
        .chat-header .info .status { color: var(--text-muted); font-size: 13px; }

        .chat-messages { flex: 1; padding: 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .message-wrapper { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; margin-bottom: 6px; margin-top: 2px; }
        .message-wrapper.own { align-self: flex-end; flex-direction: row-reverse; margin-right: 4px; }
        .message-wrapper.other { align-self: flex-start; margin-left: 4px; }
        .message-wrapper .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; flex-shrink: 0; margin-top: 2px; background: var(--accent-color); }
        .message-wrapper.own .msg-avatar { visibility: hidden; }
        .message-wrapper .msg-content { display: flex; flex-direction: column; align-items: flex-start; }
        .message-wrapper .msg-content .sender-name { font-size: 12px; color: var(--accent-color); font-weight: 500; margin-bottom: 2px; margin-left: 4px; }

        .message { padding: 8px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; cursor: default; display: block; max-width: 100%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .message.received { background: var(--bg-secondary); color: #fff; border-bottom-left-radius: 4px; }
        .message.sent { background: var(--accent-color); color: #fff; border-bottom-right-radius: 4px; }
        .message .time { font-size: 10px; color: var(--text-muted); margin-top: 4px; text-align: right; display: block; }
        .message.sent .time { color: rgba(255,255,255,0.6); }
        .message img { max-width: 100%; width: auto; max-height: 350px; border-radius: 12px; margin-top: 4px; display: block; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .message img:only-child { margin-top: 0; }
        .message a { color: var(--accent-color); text-decoration: underline; }

        .chat-input { padding: 10px 12px; display: flex; align-items: center; gap: 8px; background: var(--bg-secondary); border-top: 1px solid var(--border-color); }
        .chat-input input { flex: 1; background: var(--bg-secondary); border: none; padding: 10px 14px; border-radius: 20px; color: #fff; font-size: 15px; outline: none; }
        .chat-input input::placeholder { color: var(--text-muted); }
        .chat-input button { background: var(--accent-color); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .chat-input button:hover { filter: brightness(1.1); }
        .chat-input .upload-btn { background: transparent; color: var(--text-muted); font-size: 22px; width: auto; padding: 0 4px; }
        .chat-input .upload-btn:hover { color: var(--accent-color); }

        /* ====== МОДАЛЬНЫЕ ОКНА ====== */
        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-secondary); padding: 24px; border-radius: 16px; width: 90%; max-width: 360px; max-height: 80%; overflow-y: auto; border: 1px solid var(--border-color); }
        .modal h2 { font-size: 20px; margin-bottom: 16px; }
        .modal input, .modal textarea { width: 100%; background: var(--bg-color); border: 1px solid var(--border-color); padding: 12px 14px; border-radius: 10px; color: #fff; font-size: 15px; outline: none; margin-bottom: 12px; }
        .modal input::placeholder, .modal textarea::placeholder { color: var(--text-muted); }
        .modal textarea { resize: vertical; min-height: 60px; }
        .modal .user-check { display: flex; align-items: center; gap: 12px; padding: 8px 0; color: #fff; cursor: pointer; }
        .modal .user-check input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent-color); }
        .modal .btn-row { display: flex; gap: 10px; margin-top: 16px; }
        .modal .btn-row button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .modal .btn-primary { background: var(--accent-color); color: white; }
        .modal .btn-primary:hover { filter: brightness(1.1); }
        .modal .btn-secondary { background: var(--bg-color); color: var(--text-muted); }
        .modal .btn-secondary:hover { background: var(--bg-secondary); }
        .modal .btn-danger { background: #b54a4a; color: white; }

        .settings-row { display: flex; flex-direction: column; gap: 12px; margin: 12px 0; }
        .settings-row label { color: var(--text-muted); font-size: 13px; }
        .settings-row input { margin-bottom: 0; }
        .settings-row input[type="color"] { width: 50px; height: 50px; padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); background: transparent; cursor: pointer; }
        .settings-row input[type="range"] { width: 100%; height: 6px; background: var(--border-color); border-radius: 4px; -webkit-appearance: none; outline: none; padding: 0; }
        .settings-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent-color); border-radius: 50%; cursor: pointer; }
        .settings-status { padding: 10px; border-radius: 8px; margin: 8px 0; font-size: 14px; text-align: center; }
        .settings-status.online { background: rgba(138, 92, 245, 0.2); color: var(--accent-color); }
        .settings-status.offline { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }

        /* ====== УВЕДОМЛЕНИЯ ====== */
        #toast-container { position: absolute; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--bg-secondary); border: 1px solid var(--border-color); border-left: 4px solid var(--accent-color); padding: 12px 16px; border-radius: 12px; color: #fff; font-size: 14px; box-shadow: 0 6px 20px rgba(0,0,0,0.6); min-width: 200px; max-width: 300px; display: flex; flex-direction: column; gap: 4px; animation: slideInRight 0.3s ease-out; pointer-events: auto; cursor: default; }
        .toast .toast-title { font-weight: 600; color: var(--accent-color); font-size: 14px; }
        .toast .toast-body { color: var(--text-muted); font-size: 13px; word-break: break-word; }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .notification-request-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(138, 92, 245, 0.2); backdrop-filter: blur(10px); color: white;
            border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 30px;
            font-size: 14px; font-weight: 500; cursor: pointer; z-index: 10; transition: 0.2s; display: none;
            white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .notification-request-btn:hover { background: rgba(138, 92, 245, 0.4); transform: translateX(-50%) scale(1.05); }
    </style>
</head>
<body>
<div class="app" id="appContainer">
    <!-- ФОН -->
    <div id="app-bg"></div>

    <!-- СТАРТОВЫЙ ЭКРАН -->
    <div id="startScreen">
        <div class="start-logo">sae <span>chat</span></div>
        <div class="start-sub">Твой мир общения</div>
        <button class="btn-start" id="startBtn">▶ Начать</button>
    </div>

    <!-- ЭКРАН ВХОДА/РЕГИСТРАЦИИ -->
    <div id="authScreen">
        <div class="auth-header">
            <div class="auth-logo">sae <span>chat</span></div>
            <p>Войдите или создайте аккаунт</p>
        </div>
        
        <!-- ДВЕ ГЛАВНЫЕ КНОПКИ -->
        <div class="auth-main-buttons" id="authMainButtons">
            <button class="auth-main-btn login" id="showLoginBtn">🔐 Войти</button>
            <button class="auth-main-btn register" id="showRegisterBtn">➕ Создать аккаунт</button>
        </div>

        <!-- ОБЛАСТЬ С ПОЛЯМИ (СКРЫТА) -->
        <div id="authFormContainer">
            <!-- Поля для входа -->
            <div id="loginFields">
                <input class="auth-input" id="loginUsername" placeholder="Юзернейм">
                <input class="auth-input" id="loginPassword" type="password" placeholder="Пароль">
            </div>

            <!-- Поля для регистрации -->
            <div id="regFields" style="display:none;">
                <input class="auth-input" id="regFirstName" placeholder="Имя">
                <input class="auth-input" id="regLastName" placeholder="Фамилия (необязательно)">
                <input class="auth-input" id="regUsername" placeholder="Юзернейм (3-20 символов)">
                <input class="auth-input" id="regPassword" type="password" placeholder="Пароль (минимум 4 символа)">
                
                <div class="auth-avatar-setup">
                    <div class="auth-avatar-preview" id="regAvatarPreview">😎</div>
                    <div class="auth-avatar-controls">
                        <label>Смайлик</label>
                        <select class="avatar-emoji-select" id="regEmojiSelect">
                            <option>😎</option><option>🤩</option><option>😇</option><option>🥳</option>
                            <option>🐱</option><option>🦊</option><option>🐼</option><option>🐨</option>
                            <option>🔥</option><option>⭐</option><option>💎</option><option>🎮</option>
                            <option>🌈</option><option>🍕</option><option>🚀</option><option>👽</option>
                        </select>
                        <label>Цвет фона</label>
                        <input class="avatar-color-select" type="color" id="regColorSelect" value="#8a5cf5">
                    </div>
                </div>
                <input class="auth-input" type="file" id="regAvatarFile" accept="image/*" style="padding:8px;">
            </div>

            <!-- КНОПКА ОТПРАВИТЬ -->
            <button class="auth-submit-btn" id="authSubmitBtn">Войти</button>
            
            <!-- ССЫЛКА НАЗАД -->
            <div class="auth-back-link" id="authBackLink">← <span>Назад к выбору</span></div>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="mainScreen">
        <div class="main-header">
            <div class="title-area">
                <div class="avatar-stack">
                    <div class="mini-avatar avatar-color-1">A</div>
                    <div class="mini-avatar avatar-color-2">B</div>
                    <div class="mini-avatar avatar-color-3">C</div>
                </div>
                <div class="title" id="connectionTitle">Соединение...</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="menuBtn">⋮</button>
            </div>
        </div>

        <div class="search-bar">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Поиск чатов или пользователей...">
            </div>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chatScreen">
        <div class="chat-header">
            <button class="back-btn" id="backToChats">←</button>
            <div class="avatar" id="chatAvatar">A</div>
            <div class="info">
                <h2 id="chatName">Контакт</h2>
                <div class="status" id="chatStatus">онлайн</div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <button class="upload-btn" id="uploadBtn">📎</button>
            <input type="text" id="chatInput" placeholder="Напишите сообщение...">
            <button id="chatSendBtn">➤</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="dropdown-overlay" id="dropdownOverlay">
        <div class="dropdown-menu">
            <button class="dropdown-item" onclick="closeDropdown(); showFavorites();"><span class="icon active-icon">⭐</span> Избранное</button>
            <button class="dropdown-item" onclick="closeDropdown(); showProfile();"><span class="icon active-icon">🧑‍💻</span> Профиль</button>
            <button class="dropdown-item" onclick="closeDropdown(); showSettings();"><span class="icon active-icon">⚙️</span> Настройки</button>
            <button class="dropdown-item" onclick="closeDropdown(); showCreateGroup();"><span class="icon active-icon">👥</span> Создать группу</button>
            <button class="dropdown-item" onclick="closeDropdown(); showChannels();"><span class="icon active-icon">📢</span> Каналы</button>
        </div>
    </div>

    <!-- КОНТЕКСТНЫЕ МЕНЮ -->

<script>

    const firebaseConfig = {

    // ========== ДАННЫЕ ==========
    let currentUser = { username: '', password: '', uid: '', avatar: null, firstName: '', lastName: '' };
    let isLoginMode = false;
    let contextMessageData = null;

    let isOnline = true;
    let userSettings = { accentColor: '#8a5cf5', compressQuality: 80, bgImage: null, blurAmount: 0 };
    
    let chats = [];

    let channels = [
        { id: 'c1', name: 'Новости IT', description: 'Свежие новости', subscribed: false, owner: false },

    ];
    const groupColors = ['avatar-color-6', 'avatar-color-7', 'avatar-color-8', 'avatar-color-9', 'avatar-color-10'];

    // ========== DOM ЭЛЕМЕНТЫ ==========
    const appContainer = document.getElementById('appContainer');

    const authMainButtons = document.getElementById('authMainButtons');

    const authBackLink = document.getElementById('authBackLink');
    
    const loginUsername = document.getElementById('loginUsername');

    const regUsername = document.getElementById('regUsername');
    const regFirstName = document.getElementById('regFirstName');
    const regLastName = document.getElementById('regLastName');
    const regPassword = document.getElementById('regPassword');
    const regEmojiSelect = document.getElementById('regEmojiSelect');
    const regColorSelect = document.getElementById('regColorSelect');
    const regAvatarPreview = document.getElementById('regAvatarPreview');
    const regAvatarFile = document.getElementById('regAvatarFile');
    const regFields = document.getElementById('regFields');
    const loginFields = document.getElementById('loginFields');
    const showLoginBtn = document.getElementById('showLoginBtn');
    const showRegisterBtn = document.getElementById('showRegisterBtn');

    const chatList = document.getElementById('chatList');
    const searchInput = document.getElementById('searchInput');
    const menuBtn = document.getElementById('menuBtn');
    const backBtn = document.getElementById('backToChats');
    const chatAvatar = document.getElementById('chatAvatar');
    const chatName = document.getElementById('chatName');
    const chatStatus = document.getElementById('chatStatus');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');
    const uploadBtn = document.getElementById('uploadBtn');

    let currentChatId = null;

    // ========== ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ЭКРАНАМИ ==========
    startBtn.addEventListener('click', () => {
        startScreen.classList.add('hidden');
        setTimeout(() => {
            startScreen.style.display = 'none';
            authScreen.style.display = 'flex';
        }, 500);
    });

    // КНОПКИ "ВОЙТИ" И "СОЗДАТЬ АККАУНТ"
    showLoginBtn.addEventListener('click', () => {
        isLoginMode = true;
        authMainButtons.style.display = 'none';
        authFormContainer.style.display = 'block';
        loginFields.style.display = 'block';
        regFields.style.display = 'none';
        authSubmitBtn.style.display = 'block';
        authSubmitBtn.textContent = '🔐 Войти';
        authBackLink.style.display = 'block';
    });

    showRegisterBtn.addEventListener('click', () => {
        isLoginMode = false;
        authMainButtons.style.display = 'none';
        authFormContainer.style.display = 'block';
        loginFields.style.display = 'none';
        regFields.style.display = 'block';
        authSubmitBtn.style.display = 'block';
        authSubmitBtn.textContent = '➕ Создать аккаунт';
        authBackLink.style.display = 'block';
    });

    authBackLink.addEventListener('click', () => {
        authFormContainer.style.display = 'none';
        authMainButtons.style.display = 'flex';
        document.getElementById('loginPassword').value = '';
        document.getElementById('regPassword').value = '';
    });

    // ========== ОБНОВЛЕНИЕ АВАТАРКИ ПРИ РЕГИСТРАЦИИ ==========
    regEmojiSelect.addEventListener('change', updateRegAvatar);
    regColorSelect.addEventListener('change', updateRegAvatar);
    regAvatarFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                regAvatarPreview.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
            };
            reader.readAsDataURL(file);
        }
    });

    function updateRegAvatar() {
        const emoji = regEmojiSelect.value;
        const color = regColorSelect.value;
        regAvatarPreview.style.background = color;
        if (!regAvatarFile.files || regAvatarFile.files.length === 0) {
            regAvatarPreview.innerHTML = emoji;
        }
    }

    // ========== АВТОВХОД И ЗАГРУЗКА НАСТРОЕК ==========
    window.addEventListener('load', () => {
        setTimeout(() => { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); }, 300);
        const savedUser = localStorage.getItem('messenger_user');
        const savedSettings = localStorage.getItem('messenger_settings');
        if (savedSettings) {
            userSettings = JSON.parse(savedSettings);
            applyAccentColor(userSettings.accentColor);
            applyCustomBg(userSettings.bgImage, userSettings.blurAmount);
        }
        
        if ("Notification" in window && Notification.permission === "default") {
            document.getElementById('notificationBtn').style.display = 'block';
        }
        
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (currentUser.uid) {
                startScreen.style.display = 'none';
                authScreen.style.display = 'none';
                mainScreen.style.display = 'flex';
                checkInternetAndUpdateStatus();
                startListeningChats();
                updateMainAvatar();
            }
        }
    });

    // ========== ВХОД / РЕГИСТРАЦИЯ ==========
    authSubmitBtn.addEventListener('click', async () => {
        if (isLoginMode) {
            // ВХОД
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();
            if (!username || !password) { alert('Введите юзернейм и пароль!'); return; }
            
            const userRef = db.ref('users');
            const snapshot = await userRef.once('value');
            const data = snapshot.val();
            let foundUser = null;
            if (data) {
                Object.keys(data).forEach(key => {
                    if (key === 'user_' + username && data[key].password === password) {
                        foundUser = { ...data[key], uid: key };
                    }
                });
            }
            if (foundUser) {
                currentUser = foundUser;
                if (foundUser.avatar) currentUser.avatar = foundUser.avatar;
                localStorage.setItem('messenger_user', JSON.stringify(currentUser));
                authScreen.style.display = 'none';
                mainScreen.style.display = 'flex';
                updateMainAvatar();
                checkInternetAndUpdateStatus();
                startListeningChats();
                setUserOnline(foundUser.uid, foundUser.username);
            } else {
                alert('Неверный юзернейм или пароль!');
            }
        } else {
            // РЕГИСТРАЦИЯ
            const username = regUsername.value.trim();
            const firstName = regFirstName.value.trim();
            const lastName = regLastName.value.trim();
            const password = regPassword.value.trim();
            
            if (!password || password.length < 4) { alert('Пароль должен быть минимум 4 символа!'); return; }
            if (!username || username.length < 3 || username.length > 20) {
                alert('Юзернейм должен быть от 3 до 20 символов!');
                return;
            }
            
            const userRef = db.ref('users');
            const snapshot = await userRef.once('value');
            const data = snapshot.val();
            let isTaken = false;
            if (data) {
                Object.keys(data).forEach(key => {
                    if (key === 'user_' + username) isTaken = true;
                });
            }
            if (isTaken) {
                alert('Этот юзернейм уже занят! Придумайте другой.');
                return;
            }

            let avatarData = null;
            if (regAvatarFile.files && regAvatarFile.files.length > 0) {
                const file = regAvatarFile.files[0];
                const reader = new FileReader();
                avatarData = await new Promise((resolve) => {
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.readAsDataURL(file);
                });
            } else {
                avatarData = JSON.stringify({ emoji: regEmojiSelect.value, color: regColorSelect.value });
            }

            const uid = 'user_' + username;
            const newUser = { 
                username, password, firstName, lastName, 
                status: 'online', lastSeen: Date.now(), 
                avatar: avatarData 
            };
            await db.ref('users/' + uid).set(newUser);
            currentUser = { ...newUser, uid };
            localStorage.setItem('messenger_user', JSON.stringify(currentUser));
            authScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            updateMainAvatar();
            checkInternetAndUpdateStatus();
            startListeningChats();
            setUserOnline(uid, username);
        }
    });

    // ========== СТАТУС ИНТЕРНЕТА И ПОЛЬЗОВАТЕЛЯ ==========
    async function checkInternetAndUpdateStatus() {
        try {
            await fetch('https://firebase.google.com/', { method: 'HEAD', mode: 'no-cors', cache: 'no-cache' });
            isOnline = true;
            if (currentUser.username) connectionTitle.textContent = currentUser.username;
            else connectionTitle.textContent = '...';
        } catch {
            isOnline = false;
            connectionTitle.textContent = 'Offline';
        }
    }
    setInterval(checkInternetAndUpdateStatus, 5000);

    function setUserOnline(uid, username) {
        if (!uid) return;
        db.ref('users/' + uid).update({ status: 'online', lastSeen: Date.now() });
        window.addEventListener('beforeunload', () => {
            db.ref('users/' + uid).update({ status: 'offline' });
        });
    }

    function applyAccentColor(color) {
        document.documentElement.style.setProperty('--accent-color', color);
        document.getElementById('regColorSelect').value = color;
    }

    function applyCustomBg(image, blur) {
        if (image) {
            bgElement.style.backgroundImage = `url(${image})`;
            bgElement.style.filter = `blur(${blur}px)`;
        } else {
            bgElement.style.backgroundImage = 'none';
            bgElement.style.filter = 'blur(0px)';
        }
    }

    function updateMainAvatar() {
        const el = document.querySelector('.main-header .avatar-stack .mini-avatar:first-child');
        if (el) {
            if (currentUser.avatar && !currentUser.avatar.startsWith('{"')) {
                el.style.backgroundImage = `url(${currentUser.avatar})`;
                el.style.backgroundSize = 'cover';
                el.textContent = '';
            } else {
                el.style.backgroundImage = 'none';
                el.textContent = (currentUser.firstName || currentUser.username || '?').charAt(0).toUpperCase();
            }
        }
    }

    // ========== СИНХРОНИЗАЦИЯ ЧАТОВ ==========
    function startListeningChats() {
        if (chatListener) chatListener.off();
        chatListener = db.ref('users/' + currentUser.uid + '/chats');
        chatListener.on('value', (snapshot) => {
            const data = snapshot.val();
            chats = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    chats.push({ ...data[key], id: key });
                });
            }
            renderChats();
        });
    }

    // ========== ПОИСК (ЧАТЫ + ПОЛЬЗОВАТЕЛИ) ==========
    searchInput.addEventListener('input', async (e) => {
        const query = e.target.value.trim();
        if (query.length === 0) {
            renderChats();
            return;
        }

        const filteredChats = chats.filter(c => c.name.toLowerCase().includes(query.toLowerCase()));
        
        const userSnapshot = await db.ref('users').once('value');
        const userData = userSnapshot.val();
        let foundUsers = [];
        if (userData) {
            Object.keys(userData).forEach(key => {
                const u = userData[key];
                if (key !== currentUser.uid && u.username && u.username.toLowerCase().includes(query.toLowerCase())) {
                    foundUsers.push({ username: u.username, uid: key, avatar: u.avatar, firstName: u.firstName });
                }
            });
        }

        chatList.innerHTML = '';
        
        filteredChats.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'chat-item';
            item.innerHTML = `
                <div class="avatar ${chat.color}">${(chat.name || '?').charAt(0).toUpperCase()}</div>
                <div class="info">
                    <div class="row"><div class="name">${chat.name}</div><div class="time">${chat.time || ''}</div></div>
                    <div class="row"><div class="last-msg">${chat.lastMsg || ''}</div></div>
                </div>
            `;
            item.addEventListener('click', () => openChat(chat.id));
            chatList.appendChild(item);
        });

        foundUsers.forEach(u => {
            const item = document.createElement('div');
            item.className = 'chat-item';
            let avatarContent = (u.firstName || u.username || '?').charAt(0).toUpperCase();
            let avatarStyle = 'background: var(--accent-color);';
            if (u.avatar && !u.avatar.startsWith('{"')) {
                avatarStyle = `background-image: url(${u.avatar}); background-size: cover;`;
                avatarContent = '';
            }
            item.innerHTML = `
                <div class="avatar" style="${avatarStyle}">${avatarContent}</div>
                <div class="info">
                    <div class="row"><div class="name">${u.username}</div><div class="time">(глобальный)</div></div>
                    <div class="row"><div class="last-msg">Нажми, чтобы начать чат</div></div>
                </div>
            `;
            item.addEventListener('click', () => startChatWithUser(u.uid, u.username, u.avatar));
            chatList.appendChild(item);
        });
    });

    async function startChatWithUser(targetUid, targetUsername, targetAvatar) {
        let existingChat = chats.find(c => c.otherUserUid === targetUid);
        if (existingChat) {
            openChat(existingChat.id);
            return;
        }

        const chatId = 'chat_' + Date.now().toString(36);
        const color = groupColors[Math.floor(Math.random() * groupColors.length)];
        
        const myChat = {
            id: chatId, name: targetUsername, lastMsg: 'Чат создан', time: 'только что',
            color: color, type: 'personal', members: [], unread: 0, check: false,
            pinned: false, archived: false, otherUserUid: targetUid, otherUserAvatar: targetAvatar
        };
        
        const friendChat = {
            id: chatId, name: currentUser.username, lastMsg: 'Чат создан', time: 'только что',
            color: color, type: 'personal', members: [], unread: 0, check: false,
            pinned: false, archived: false, otherUserUid: currentUser.uid, otherUserAvatar: currentUser.avatar
        };

        await db.ref('users/' + currentUser.uid + '/chats/' + chatId).set(myChat);
        await db.ref('users/' + targetUid + '/chats/' + chatId).set(friendChat);
        openChat(chatId);
    }

    // ========== ОТРИСОВКА ЧАТОВ ==========
    function renderChats() {
        chatList.innerHTML = '';
        let filtered = chats.filter(c => !c.archived);
        filtered.sort((a, b) => (b.pinned === true) - (a.pinned === true));

        filtered.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'chat-item';
            item.dataset.id = chat.id;
            const unreadBadge = chat.unread > 0 ? `<span class="badge-unread">${chat.unread}</span>` : '';
            const checkIcon = chat.check ? '<span class="check">✓</span>' : '';
            const pinIcon = chat.pinned ? '📌 ' : '';
            const favIcon = chat.isFavorite ? '⭐ ' : '';
            
            let avatarImg = '';
            if (chat.otherUserAvatar) {
                avatarImg = `background-image: url(${chat.otherUserAvatar}); background-size: cover;`;
            }

            item.innerHTML = `
                <div class="avatar ${chat.color || 'avatar-color-1'}" style="${avatarImg}">${(chat.name || '?').charAt(0).toUpperCase()}</div>
                <div class="info">
                    <div class="row"><div class="name">${favIcon}${pinIcon}${chat.name || 'Без названия'}</div><div class="time">${chat.time || ''}</div></div>
                    <div class="row"><div class="last-msg">${checkIcon} ${chat.lastMsg || ''}</div>${unreadBadge}</div>
                </div>
            `;
            item.addEventListener('click', () => openChat(chat.id));
            let pressTimer = null;
            const startPress = () => { pressTimer = setTimeout(() => showChatContextMenu(chat.id), 600); };
            const endPress = () => { clearTimeout(pressTimer); };
            item.addEventListener('mousedown', startPress);
            item.addEventListener('mouseup', endPress);
            item.addEventListener('mouseleave', endPress);
            item.addEventListener('touchstart', startPress);
            item.addEventListener('touchend', endPress);
            chatList.appendChild(item);
        });
    }

    // ========== ОТКРЫТИЕ ЧАТА ==========
    function openChat(id) {
        if (currentChatId === id) return;
        if (currentChatId) {
            db.ref('sendmessages').orderByChild('chatId').equalTo(currentChatId).off();
            const oldChat = chats.find(c => c.id === currentChatId);
            if (oldChat && oldChat.otherUserUid) {
                db.ref('users/' + currentUser.uid + '/typing/' + oldChat.otherUserUid).off();
            }
        }
        currentChatId = id; 
        const chat = chats.find(c => c.id === id); 
        if (!chat) return;
        chatAvatar.className = `avatar ${chat.color || 'avatar-color-1'}`;
        chatAvatar.textContent = (chat.name || '?').charAt(0).toUpperCase();
        chatName.textContent = chat.name || 'Контакт';
        chatStatus.textContent = chat.type === 'group' ? 'группа' : 'онлайн';
        chatName.onclick = () => showChatProfile(chat);
        
        const msgRef = db.ref('sendmessages').orderByChild('chatId').equalTo(id);
        msgRef.off();
        msgRef.on('value', (snapshot) => {
            const data = snapshot.val();
            messages[id] = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    const msg = data[key];
                    if (msg.sender === currentUser.username) msg.type = 'sent';
                    else {
                        msg.type = 'received';
                        if (lastNotifiedMsg[id] !== key) {
                            lastNotifiedMsg[id] = key;
                            showToast(chat.name || 'Новое сообщение', msg.text);
                            if (("Notification" in window) && Notification.permission === "granted") {
                                new Notification(chat.name || 'Новое сообщение', { 
                                    body: msg.text, icon: 'https://i.ibb.co/Pv3K1PvK/icon.png' 
                                });
                            }
                        }
                    }
                    messages[id].push({ ...msg, id: key });
                });
            }
            renderMessages(id);
        });
        listenTyping(id);
        mainScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        chatInput.focus();
    }

    function renderMessages(chatId) {
        chatMessages.innerHTML = '';
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        const msgs = messages[chatId] || [];
        const isGroup = chat.type === 'group';
        msgs.forEach((msg, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${msg.type === 'sent' ? 'own' : 'other'}`;
            if (isGroup && msg.type === 'received' && msg.avatarColor) {
                const avatarDiv = document.createElement('div');
                avatarDiv.className = `msg-avatar ${msg.avatarColor}`;
                avatarDiv.textContent = msg.sender ? msg.sender.charAt(0).toUpperCase() : '?';
                wrapper.appendChild(avatarDiv);
            } else {
                const spacer = document.createElement('div');
                spacer.className = 'msg-avatar';
                spacer.style.visibility = 'hidden';
                wrapper.appendChild(spacer);
            }
            const content = document.createElement('div');
            content.className = 'msg-content';
            if (isGroup && msg.type === 'received' && msg.sender) {
                const nameDiv = document.createElement('div');
                nameDiv.className = 'sender-name';
                nameDiv.textContent = msg.sender;
                content.appendChild(nameDiv);
            }
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.type}`;
            msgDiv.dataset.index = index;
            let displayText = msg.text;
            let isImage = false;
            let imageUrl = null;
            let isFile = false;
            let fileUrl = null;
            let fileName = null;
            if (msg.text && msg.text.startsWith('https://i.ibb.co/')) {
                isImage = true; imageUrl = msg.text; displayText = '📷 Фото';
            } 
            else if (msg.text && msg.text.startsWith('FILE:')) {
                isFile = true; const parts = msg.text.split('|'); fileUrl = parts[1]; fileName = parts[2] || 'Документ'; displayText = `📄 ${fileName}`;
            }
            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `<div style="border-left:3px solid var(--accent-color);padding-left:8px;margin-bottom:6px;font-size:13px;color:var(--text-muted);background:rgba(255,255,255,0.05);border-radius:4px;padding:4px 8px;">
                    <span style="font-size:11px;color:var(--accent-color);">В ответ на:</span><br>
                    ${msg.replyTo}
                </div>`;
            }
            if (isImage) {
                msgDiv.innerHTML = `${replyHtml}<img src="${imageUrl}" alt="Фото" onclick="event.stopPropagation(); openBrowser('${imageUrl}', true)"> <span class="time">${msg.time}</span>`;
            } else if (isFile) {
                msgDiv.innerHTML = `${replyHtml}<a href="${fileUrl}" target="_blank" style="color:var(--accent-color);text-decoration:underline;font-weight:500;">${displayText}</a> <span class="time">${msg.time}</span>`;
            } else if (msg.text && (msg.text.startsWith('http://') || msg.text.startsWith('https://'))) {

    uploadBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,.pdf,.txt,.zip,.doc,.docx';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200, MAX_HEIGHT = 1200;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; } } 
                        else { if (h > MAX_HEIGHT) { w *= MAX_HEIGHT / h; h = MAX_HEIGHT; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        const quality = userSettings.compressQuality / 100;
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        const blob = await fetch(compressedDataUrl).then(res => res.blob());
                        const compressedFile = new File([blob], file.name, { type: 'image/jpeg' });
                        uploadToImgBB(compressedFile);
                    };
                };
            } else { uploadToImgBB(file); }
        };
        input.click();
    });

    async function uploadToImgBB(file) {
        const formData = new FormData(); formData.append('image', file);
        try {
            const apiKey = '5f577dda10160d0afd0e1ad79d65ad73';
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, { method: 'POST', body: formData });
            const data = await response.json();
            if (data.success) {
                let text = data.data.url;
                if (!file.type.startsWith('image/')) text = `FILE:${data.data.url}|${file.name}`;
                sendChatMessage(text, replyingTo);
            } else { alert('Ошибка загрузки: ' + data.error.message); }
        } catch (err) { alert('Ошибка соединения с ImgBB: ' + err.message); }
    }

                db.ref('sendmessages').orderByChild('chatId').equalTo(chat.id).once('value', (snap) => {

        });
    }

    function showCreateChannel() {
        openModal(`<h2>📢 Создать канал</h2><input type="text" id="channelNameInput" placeholder="Название канала"><textarea id="channelDescInput" placeholder="Описание канала"></textarea><div class="btn-row"><button class="btn-secondary" onclick="closeModal()">Отмена</button><button class="btn-primary" id="createChannelFinalBtn">Создать</button></div>`);
        document.getElementById('createChannelFinalBtn').addEventListener('click', () => {
            const name = document.getElementById('channelNameInput').value.trim() || 'Мой канал';
            const description = document.getElementById('channelDescInput').value.trim() || 'Без описания';
            channels.push({ id: 'c' + (++channelIdCounter), name, description, subscribed: true, owner: true });
            closeModal(); showChannels();
        });
    }

    const notificationBtn = document.getElementById('notificationBtn');
    function sendSystemNotification(title, body) {
        if (!("Notification" in window)) return;
        if (Notification.permission === "granted") {
            new Notification(title, { body: body, icon: 'https://i.ibb.co/Pv3K1PvK/icon.png' });
        }
    }
    function showToast(title, message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${message}</div>`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'slideInRight 0.3s ease-out reverse'; setTimeout(() => toast.remove(), 300); }, 4000);
    }
    notificationBtn.addEventListener('click', async () => {
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
            notificationBtn.style.display = 'none';
            new Notification("Уведомления включены!", { body: "Теперь вы будете получать уведомления о новых сообщениях.", icon: 'https://i.ibb.co/Pv3K1PvK/icon.png' });
        }
    });
</script>
</body>
</html>
